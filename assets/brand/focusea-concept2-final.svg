<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Focusea Concept 2 logo</title>
  <desc id="desc">A cyan maritime technology logo with a radar screen, an F-shaped route mark and navigation waypoints.</desc>
  <defs>
    <linearGradient id="plate" x1="22" y1="18" x2="236" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07324a"/>
      <stop offset=".48" stop-color="#041927"/>
      <stop offset="1" stop-color="#050817"/>
    </linearGradient>
    <linearGradient id="route" x1="46" y1="181" x2="214" y2="77" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6dfff0"/>
      <stop offset=".47" stop-color="#20d8ff"/>
      <stop offset="1" stop-color="#7b72ff"/>
    </linearGradient>
    <linearGradient id="mark" x1="73" y1="56" x2="181" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset=".42" stop-color="#d8fffb"/>
      <stop offset="1" stop-color="#45f1dc"/>
    </linearGradient>
    <filter id="shadow" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="17" stdDeviation="12" flood-color="#000615" flood-opacity=".72"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="#020713"/>
  <rect x="14" y="14" width="228" height="228" rx="45" fill="url(#plate)"/>

  <g opacity=".58">
    <circle cx="128" cy="128" r="92" fill="none" stroke="#55ffe8" stroke-width="2"/>
    <circle cx="128" cy="128" r="66" fill="none" stroke="#25d9ff" stroke-width="2" opacity=".72"/>
    <circle cx="128" cy="128" r="34" fill="none" stroke="#897dff" stroke-width="2" opacity=".72"/>
    <path d="M128 32v24M128 200v24M32 128h24M200 128h24" fill="none" stroke="#d7fffa" stroke-linecap="round" stroke-width="4" opacity=".74"/>
  </g>

  <path d="M128 128l84-51c-10 39-35 72-84 51Z" fill="#55ffe8" opacity=".14"/>
  <path d="M128 128l82-50" fill="none" stroke="#55ffe8" stroke-linecap="round" stroke-width="5"/>
  <circle cx="128" cy="128" r="8" fill="#55ffe8"/>

  <g filter="url(#glow)" opacity=".38">
    <path d="M79 70h89M79 70v115M79 119h61" fill="none" stroke="#55ffe8" stroke-linecap="round" stroke-linejoin="round" stroke-width="25"/>
    <path d="M143 119h42" fill="none" stroke="#55ffe8" stroke-linecap="round" stroke-width="18"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M79 72h89M79 72v113M79 120h61" fill="none" stroke="#020713" stroke-linecap="round" stroke-linejoin="round" stroke-width="30" opacity=".74"/>
    <path d="M79 70h89M79 70v115M79 119h61" fill="none" stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round" stroke-width="19"/>
    <path d="M143 119h42l-18-16M185 119l-18 16" fill="none" stroke="#55ffe8" stroke-linecap="round" stroke-linejoin="round" stroke-width="10"/>
  </g>

  <path d="M49 181c25-19 52-23 81-9 32 15 58 5 82-31" fill="none" stroke="#00101c" stroke-linecap="round" stroke-width="18" opacity=".58"/>
  <path d="M50 181c24-19 51-23 80-9 32 15 58 5 82-31" fill="none" stroke="url(#route)" stroke-linecap="round" stroke-width="9"/>
  <circle cx="50" cy="181" r="8" fill="#6dfff0"/>
  <circle cx="130" cy="172" r="7" fill="#20d8ff"/>
  <circle cx="212" cy="141" r="8" fill="#7b72ff"/>
</svg>
